name: Build Test EXE

# Manual, fast test build of the app exe — press the button, wait ~1-2 min,
# download from the Releases page. NOT the full installer release.
#
# Actions -> "Build Test EXE" -> Run workflow. It does just
# `cargo build -p app --release` (~1 min with cache) and publishes the single
# standalone sharectrl.exe as a pre-release named "Test build <sha>". It shows up
# at the top of the Releases page like any release — download it there on the
# other machine, no special link to remember.
#
# This skips everything the real Release does (NSIS installer, SYSTEM service,
# cargo-deny gate, tauri-cli). Use the Release workflow for a distributable,
# versioned build; use this to test a change across the two machines quickly.
on:
  workflow_dispatch:

# A second run supersedes an in-flight one.
concurrency:
  group: build-test-exe
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    # MUST be Windows: DXGI / Media Foundation / WebView2.
    runs-on: windows-latest
    defaults:
      run:
        working-directory: native

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      # Just the app binary, with the fast-compiling test-build profile (no LTO,
      # parallel codegen). The Tauri build embeds the UI; no bundling needed.
      - name: Build app (test-build profile)
        run: cargo build -p app --profile test-build

      - name: Short SHA
        id: sha
        shell: bash
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # Refresh the rolling "test" pre-release: move its tag to this commit and
      # replace the attached exe, so the Releases page always shows exactly one
      # current test build at the top.
      - name: Publish test build to Releases
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          exe=target/test-build/sharectrl.exe
          if [ ! -f "$exe" ]; then
            echo "::error::$exe not found — build produced no app binary."
            exit 1
          fi
          # Remove the old auto-build "dev" release (superseded by this manual flow).
          gh release delete dev --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag 2>/dev/null || true
          gh release delete test-build --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag 2>/dev/null || true
          gh release create test-build "$exe" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title "Test build ${{ steps.sha.outputs.short }}" \
            --notes "Fast test build of \`sharectrl.exe\` from commit ${{ steps.sha.outputs.short }}. App only — no installer, no SYSTEM service. Unsigned: SmartScreen warns (More info -> Run anyway). Download here and overwrite the old exe on both machines."

      # Also expose it as a workflow artifact (belt and braces).
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sharectrl-${{ steps.sha.outputs.short }}
          path: native/target/test-build/sharectrl.exe
          if-no-files-found: warn
          retention-days: 14
