# CI for the native Rust rewrite (Plan 04 §10). Build + test + the license gate.
# `cargo-deny` enforces the §11 allowlist / banned-crate list — the one piece
# that actually keeps the product proprietary + legal (no AGPL/GPL crate can slip
# in). The `third-party-licenses.html` page (cargo-about) is a docs artifact, not
# a gate, so it's generated on demand, not in CI. Runs on Windows (the only target).
name: native-ci

on:
  push:
    paths:
      - "native/**"
      - ".github/workflows/native-ci.yml"
  pull_request:
    paths:
      - "native/**"
      - ".github/workflows/native-ci.yml"

defaults:
  run:
    working-directory: native

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - name: Format check
        run: cargo fmt --all --check
      - name: Build
        run: cargo build --workspace --release
      - name: Test
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  license-gate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      # Prebuilt binary — no 8-minute source compile.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: cargo-deny (license + banned-crate enforcement, §11)
        run: cargo deny check
