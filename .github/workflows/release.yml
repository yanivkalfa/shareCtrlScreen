name: Release

# Idempotent, version-driven release of the NATIVE Rust app (Plan 04 §10).
#
# The single source of truth is `version` under [workspace.package] in
# native/Cargo.toml. Clicking "Run workflow" (Actions -> Release -> Run workflow):
#   1. reads that version, e.g. 2.0.0 -> tag "v2.0.0"
#   2. if a GitHub Release with that tag already exists  -> skips (no-op)
#   3. otherwise builds the Tauri app (NSIS installer) + the SYSTEM service and
#      publishes both to a new GitHub Release tagged v<version>.
#
# Unsigned build (§8b/§11.4): SmartScreen warns on first install (More info ->
# Run anyway). No certificate, no codec licence, no cloud bill.
#
# To cut a release: bump `version` in native/Cargo.toml, commit, push, run.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Cheap Linux job: figure out the version and whether it's already released.
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      exists: ${{ steps.exists.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from native/Cargo.toml
        id: v
        shell: bash
        run: |
          version=$(grep -m1 '^version' native/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "::notice::native version = $version"

      - name: Check whether release v<version> already exists
        id: exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="v${{ steps.v.outputs.version }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Release $tag already exists — skipping build & publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No release $tag yet — will build & publish."
          fi

  # Windows build job: runs ONLY when the release does not already exist.
  build-release:
    needs: check
    if: needs.check.outputs.exists == 'false'
    # MUST be Windows: DXGI/Media Foundation/WebView2 app + NSIS installer.
    runs-on: windows-latest
    defaults:
      run:
        working-directory: native

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      # cargo-deny is a release gate too (§11): never ship a copyleft/banned dep.
      - name: License gate (cargo-deny)
        run: |
          cargo install cargo-deny --locked
          cargo deny check

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      # Build the SYSTEM service binary (sharectrl-service.exe).
      - name: Build service
        run: cargo build -p service --release

      # Build the Tauri app + NSIS installer (config lives in native/app).
      - name: Build app + installer
        working-directory: native/app
        run: cargo tauri build --bundles nsis

      # gh creates the tag v<version>, the release, and uploads the installer +
      # the service exe in one shot — atomic, no race, no draft.
      - name: Publish GitHub release with assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ needs.check.outputs.version }}"
          shopt -s nullglob
          installers=(target/release/bundle/nsis/*-setup.exe)
          service=(target/release/sharectrl-service.exe)
          files=("${installers[@]}" "${service[@]}")
          if [ ${#installers[@]} -eq 0 ]; then
            echo "No NSIS installer produced in native/target/release/bundle/nsis."
            exit 1
          fi
          echo "Releasing $tag with: ${files[*]}"
          gh release create "$tag" "${files[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "ShareCtrlScreen v${{ needs.check.outputs.version }}" \
            --notes "Native Rust build: Tauri app installer + SYSTEM service. Unsigned — SmartScreen will warn (More info -> Run anyway). Install the service (admin, once) for UAC/lock/secure-desktop control: \`sharectrl-service.exe --install-service\`." \
            --latest

      - name: Upload build artifacts (fallback download)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ShareCtrlScreen-v${{ needs.check.outputs.version }}
          path: |
            native/target/release/bundle/nsis/*-setup.exe
            native/target/release/sharectrl-service.exe
          if-no-files-found: warn
