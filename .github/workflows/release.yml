name: Release

# Idempotent, version-driven release.
#
# The single source of truth is the "version" field in app/package.json.
# Clicking "Run workflow" (Actions -> Release -> Run workflow):
#   1. reads that version, e.g. 1.0.0 -> tag "v1.0.0"
#   2. if a GitHub Release with that tag already exists  -> skips (no-op)
#   3. otherwise builds the Windows app and publishes the installer + portable
#      exe to a new GitHub Release tagged v<version>.
#
# To cut a new release: bump "version" in app/package.json, commit, push, run.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Cheap Linux job: figure out the version and whether it's already released.
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      exists: ${{ steps.exists.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from app/package.json
        id: v
        shell: bash
        run: echo "version=$(node -p "require('./app/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether release v<version> already exists
        id: exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="v${{ steps.v.outputs.version }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Release $tag already exists — skipping build & publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No release $tag yet — will build & publish."
          fi

  # Windows build job: runs ONLY when the release does not already exist.
  build-release:
    needs: check
    if: needs.check.outputs.exists == 'false'
    # MUST be Windows: Windows-only app, native koffi module, NSIS installer.
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and publish to GitHub Release
        run: npx electron-builder --win --publish always
        env:
          # electron-builder uses this to create the release (tag v<version>)
          # and upload the installer + portable exe as assets.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts (fallback download)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ShareCtrlScreen-v${{ needs.check.outputs.version }}
          path: |
            app/dist/*.exe
            app/dist/latest.yml
          if-no-files-found: warn
